name: GitHub Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract Latest Changelog
        shell: bash
        run: |
          sed -n '/^## \[/{p; :a; n; /^## \[/q; p; ba}' CHANGELOG.md > LATEST_CHANGELOG.md
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Fount ${{ github.ref_name }}
          body_path: LATEST_CHANGELOG.md
          draft: false
          prerelease: false
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-binaries:
    name: ${{ matrix.name }}
    needs: [create-release]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: Fount-Linux-x64
            archive: unix
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: Fount-Linux-Static
            archive: unix
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: Fount-Linux-ARM64
            archive: unix
          - target: universal-apple-darwin
            os: macos-latest
            name: Fount-macOS-Universal
            archive: unix
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: Fount-Windows-x64
            archive: windows
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: ${{ matrix.os == 'windows-latest' && '-C target-feature=+crt-static' || '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libdbus-1-dev libgtk-3-dev pkg-config musl-tools
      - name: Prepare Portable Instructions
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            cp docs/readme/macos.txt PORTABLE.txt
          elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp docs/readme/windows.txt PORTABLE.txt
          else
            cp docs/readme/linux.txt PORTABLE.txt
          fi
      - name: Upload Binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: fount
          target: ${{ matrix.target }}
          archive: ${{ matrix.name }}
          include: LICENSE,PORTABLE.txt,assets/linux/fount.desktop,assets/icons/FountTUI_Logo.png
          tar: ${{ matrix.archive }}
          token: ${{ secrets.GITHUB_TOKEN }}
