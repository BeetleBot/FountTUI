name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-crates-io:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libdbus-1-dev libgtk-3-dev pkg-config
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cargo Publish
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      id: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract Latest Changelog
        shell: bash
        run: |
          # Extract from the first ## [ version header to the next one
          sed -n '/^## \[/{p; :a; n; /^## \[/q; p; ba}' CHANGELOG.md > LATEST_CHANGELOG.md
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Fount ${{ github.ref_name }}
          body_path: LATEST_CHANGELOG.md
          draft: false
          prerelease: false
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    name: ${{ matrix.name }}
    needs: [create-release]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: Fount-Linux-x64
            archive: unix
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: Fount-Linux-Static
            archive: unix
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: Fount-Linux-ARM64
            archive: unix
          - target: universal-apple-darwin
            os: macos-latest
            name: Fount-macOS-Universal
            archive: unix
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: Fount-Windows-x64
            archive: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libdbus-1-dev libgtk-3-dev pkg-config musl-tools
      - name: Prepare Portable Instructions
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            cp docs/readme/macos.txt PORTABLE.txt
          elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp docs/readme/windows.txt PORTABLE.txt
          else
            cp docs/readme/linux.txt PORTABLE.txt
          fi
      - name: Upload Binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: fount
          target: ${{ matrix.target }}
          archive: ${{ matrix.name }}
          include: LICENSE,PORTABLE.txt,assets/linux/fount.desktop,assets/icons/Dark-Fount.png
          tar: ${{ matrix.archive }}
          token: ${{ secrets.GITHUB_TOKEN }}

  linux-packages:
    name: Linux Packages (.deb, .rpm)
    needs: [create-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libdbus-1-dev libgtk-3-dev pkg-config
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Packaging Tools
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm
      - name: Build DEB
        run: cargo deb
      - name: Build RPM
        run: cargo generate-rpm
      - name: Upload Packages
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/debian/*.deb
            target/generate-rpm/*.rpm
          token: ${{ secrets.GITHUB_TOKEN }}

  windows-installer:
    name: Windows Installer (.msi)
    needs: [create-release]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-wix
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-wix
      - name: Build MSI
        run: cargo wix --nocapture
      - name: Rename MSI for Winget
        shell: pwsh
        run: Move-Item target/wix/*.msi target/wix/Fount-Installer.msi
      - name: Upload MSI
        uses: softprops/action-gh-release@v2
        with:
          files: target/wix/Fount-Installer.msi
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-winget:
    name: Submit to Winget
    needs: [windows-installer]
    runs-on: ubuntu-latest
    steps:
      - name: Submit to Winget
        uses: microsoft/winget-create-action@v2
        with:
          token: ${{ secrets.WINGET_TOKEN }}
          identifier: BeetleBot.Fount
          installer-url: https://github.com/BeetleBot/Fount/releases/download/${{ github.ref_name }}/Fount-Installer.msi

  publish-scoop:
    name: Update Scoop Bucket
    needs: [upload-assets]
    runs-on: ubuntu-latest
    steps:
      - name: Update Scoop Manifest
        uses: xresgw/scoop-bucket-action@v2
        with:
          repository: BeetleBot/scoop-bucket
          token: ${{ secrets.GITHUB_TOKEN }}
          app-name: fount
          app-version: ${{ github.ref_name }}
          manifest-url: https://github.com/BeetleBot/Fount/releases/download/${{ github.ref_name }}/Fount-Windows-x64.zip
