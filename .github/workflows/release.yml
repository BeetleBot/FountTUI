name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-crates-io:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libdbus-1-dev libgtk-3-dev pkg-config
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cargo Publish
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      id: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract Latest Changelog
        shell: bash
        run: |
          # Extract from the first ## [ version header to the next one
          sed -n '/^## \[/{p; :a; n; /^## \[/q; p; ba}' CHANGELOG.md > LATEST_CHANGELOG.md
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Fount ${{ github.ref_name }}
          body_path: LATEST_CHANGELOG.md
          draft: false
          prerelease: false
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    name: ${{ matrix.name }}
    needs: [create-release]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: Fount-Linux-x64
            archive: unix
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: Fount-Linux-Static
            archive: unix
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: Fount-Linux-ARM64
            archive: unix
          - target: universal-apple-darwin
            os: macos-latest
            name: Fount-macOS-Universal
            archive: unix
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: Fount-Windows-x64
            archive: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libdbus-1-dev libgtk-3-dev pkg-config musl-tools
      - name: Prepare Portable Instructions
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            cp docs/readme/macos.txt PORTABLE.txt
          elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp docs/readme/windows.txt PORTABLE.txt
          else
            cp docs/readme/linux.txt PORTABLE.txt
          fi
      - name: Upload Binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: fount
          target: ${{ matrix.target }}
          archive: ${{ matrix.name }}
          include: LICENSE,PORTABLE.txt,assets/linux/fount.desktop,assets/icons/Dark-Fount.png
          tar: ${{ matrix.archive }}
          token: ${{ secrets.GITHUB_TOKEN }}

  linux-packages:
    name: Linux Packages (.deb, .rpm)
    needs: [create-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libdbus-1-dev libgtk-3-dev pkg-config
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Packaging Tools
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm
      - name: Build DEB
        run: cargo deb
      - name: Build RPM
        run: cargo generate-rpm
      - name: Upload Packages
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/debian/*.deb
            target/generate-rpm/*.rpm
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-aur:
    name: Publish to AUR
    needs: [upload-assets]
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install System Dependencies
        run: |
          pacman -Syu --noconfirm git openssh pacman-contrib base-devel
      - uses: actions/checkout@v4
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          # Bypassing host key checks to prevent CI failure
          cat >> ~/.ssh/config <<EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur_key
            User aur
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF
      - name: Update PKGBUILD and .SRCINFO
        run: |
          # Create a non-root user for makepkg
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
          chown -R builder:builder .
          
          cd packaging/aur
          
          # Extract version without 'v' prefix
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          
          # Use updpkgsums to update checksums (runs as builder)
          sudo -u builder updpkgsums
          
          # Generate .SRCINFO (runs as builder)
          sudo -u builder makepkg --printsrcinfo > .SRCINFO

          # Cleanup downloaded assets
          sudo -u builder rm -f *.tar.gz
      - name: Push to AUR
        run: |
          # Configure Git
          git config --global user.name "BeetleBot"
          git config --global user.email "nikarabilla@gmail.com"
          git config --global --add safe.directory '*'
          
          # Clone AUR repo and push changes
          git clone ssh://aur@aur.archlinux.org/fount-bin.git aur-repo
          cp packaging/aur/PKGBUILD packaging/aur/.SRCINFO aur-repo/
          cd aur-repo
          git add PKGBUILD .SRCINFO
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update to ${GITHUB_REF_NAME}"
            git push origin master
          fi

