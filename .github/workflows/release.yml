name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-crates-io:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libdbus-1-dev libgtk-3-dev pkg-config
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cargo Publish
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build:
    name: Build Windows MSI
    needs: publish-crates-io
    strategy:
      matrix:
        os: [windows-latest]
        include:
          - os: windows-latest
            artifact_name: Fount_Windows_${{ github.ref_name }}.msi
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}


      # Build Binary
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      # Windows MSI Packaging
      - name: Install cargo-wix
        run: cargo install cargo-wix

      - name: Build MSI
        run: cargo wix --target ${{ matrix.target }} -o target/wix/Fount_Windows_${{ github.ref_name }}.msi


      # Upload to Release
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/wix/Fount_Windows_${{ github.ref_name }}.msi
          generate_release_notes: true
          name: Fount v${{ github.ref_name }}
