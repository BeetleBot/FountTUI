name: Test MSI Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-msi:
    name: Test Windows Installer (.msi)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-wix
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-wix

      - name: Build Release Binary
        run: cargo build --release

      - name: Build MSI
        run: cargo wix --nocapture --no-build

      - name: Upload MSI as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fount-Windows-Installer
          path: target/wix/*.msi
          retention-days: 7
